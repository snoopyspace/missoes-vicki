version: '3.8'

services:
  # MySQL/TiDB Database
  db:
    image: mysql:8.0
    container_name: missoes-vicki-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-missoes_vicki}
      MYSQL_USER: ${DB_USER:-vicki_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vicki_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - missoes-vicki-network

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missoes-vicki-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-mysql://vicki_user:vicki_password@db:3306/missoes_vicki}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      OWNER_NAME: ${OWNER_NAME:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./dist:/app/dist:ro
      - ./drizzle:/app/drizzle:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      timeout: 10s
      retries: 5
      interval: 30s
    networks:
      - missoes-vicki-network
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  missoes-vicki-network:
    driver: bridge
