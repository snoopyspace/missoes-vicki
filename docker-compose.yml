version: '3.8'

services:
  db:
    image: mysql:8.0-alpine
    container_name: missoes-vicki-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: vicki
      MYSQL_USER: vicki
      MYSQL_PASSWORD: vicki123
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      timeout: 5s
      retries: 5
      interval: 10s
      start_period: 30s
    networks:
      - vicki-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missoes-vicki-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://vicki:vicki123@db:3306/vicki
      JWT_SECRET: sua-chave-secreta-aqui-minimo-32-caracteres
      VITE_APP_TITLE: Missões da Vicki
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
    networks:
      - vicki-network
    restart: unless-stopped

volumes:
  app-data:
    driver: local
  db-data:
    driver: local

networks:
  vicki-network:
    driver: bridge
